<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>代码种子练习平台</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* 顶部导航 */
    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
    }

    .nav .menu a {
      text-decoration: none;
      margin-left: 18px;
      color: #555;
      font-size: 14px;
      cursor: pointer;
    }

    .nav .menu a:hover {
      color: #2d7a2d;
    }

    /* 主体区域 */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 80px;
      padding: 0 20px;
    }

    .main h1 {
      font-size: 46px;
      margin: 0;
      color: #2d7a2d;
      letter-spacing: 2px;
    }

    .main p {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }

    .welcome {
      margin-top: 15px;
      font-size: 15px;
      color: #2d7a2d;
      font-weight: bold;
    }

    /* 搜索框 */
    .search-box {
      margin-top: 35px;
      width: 100%;
      max-width: 650px;
      display: flex;
      border: 1px solid #ccc;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-size: 16px;
    }

    .search-box button {
      width: 120px;
      border: none;
      background: #2d7a2d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #256525;
    }

    /* 快捷入口按钮 */
    .quick-links {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .quick-links a {
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 20px;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
      border: 1px solid #e6e6e6;
      transition: 0.2s;
    }

    .quick-links a:hover {
      background: #2d7a2d;
      color: white;
    }

    /* 推荐区 */
    .hot {
      margin-top: 50px;
      width: 100%;
      max-width: 650px;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fafafa;
    }

    .hot h2 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #333;
    }

    .hot ul {
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .hot li {
      padding: 10px 0;
      border-bottom: 1px dashed #ddd;
      font-size: 14px;
      cursor: pointer;
      color: #555;
    }

    .hot li:last-child {
      border-bottom: none;
    }

    .hot li:hover {
      color: #2d7a2d;
      font-weight: bold;
    }

    /* 底部 */
    footer {
      margin-top: 80px;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <!-- 顶部导航 -->
  <div class="nav">
    <div class="logo">🌱 代码种子工作室</div>

    <div class="menu">
      <a href="index.html">首页</a>
      <a href="tiku.html">题库</a>
      <a href="ziliao.html">资料库</a>
      <a onclick="logout()">退出登录</a>
    </div>
  </div>

  <!-- 主体 -->
  <div class="main">
    <h1>代码种子</h1>
    <p>每天 10 题，编程进步看得见</p>

    <div class="welcome" id="welcomeText"></div>

    <!-- 搜索框 -->
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="搜索：Python循环 / Scratch闯关 / 信息素养模拟题..." />
      <button onclick="doSearch()">搜索</button>
    </div>

    <!-- 快捷入口 -->
    <div class="quick-links">
      <a href="question.html">📌 今日练习</a>
      <a href="tiku.html">🐍 Python基础</a>
      <a href="tiku.html">🎮 Scratch闯关</a>
      <a href="tiku.html">🏆 竞赛真题</a>
      <a href="ziliao.html">📂 资料库</a>
      <a href="tiku.html">❌ 错题本</a>
    </div>

    <!-- 热门推荐 -->
    <div class="hot">
      <h2>🔥 今日推荐练习</h2>
      <ul>
        <li onclick="fillSearch('Python if判断练习')">1. Python if判断练习</li>
        <li onclick="fillSearch('for循环基础题')">2. for循环基础题</li>
        <li onclick="fillSearch('列表 list 练习题')">3. 列表 list 练习题</li>
        <li onclick="fillSearch('信息素养大赛 模拟题')">4. 信息素养大赛 模拟题</li>
        <li onclick="fillSearch('Scratch 变量与广播')">5. Scratch 变量与广播</li>
      </ul>
    </div>
  </div>

  <footer>
    © 2026 代码种子工作室 | 少儿编程练习平台（免费版）
  </footer>

  <script>
    // 检查是否已登录
    const studentName = localStorage.getItem("studentName");

    if (!studentName) {
      // 没登录就跳转到 login.html
      window.location.href = "login.html";
    } else {
      document.getElementById("welcomeText").innerText = "欢迎你：" + studentName + " 😊";
    }

    function doSearch() {
      const keyword = document.getElementById("searchInput").value.trim();

      if (keyword === "") {
        alert("请输入要搜索的内容 😊");
        return;
      }

      window.location.href = "search.html?keyword=" + encodeURIComponent(keyword);
    }

    function fillSearch(text) {
      document.getElementById("searchInput").value = text;
      doSearch();
    }

    function logout() {
      localStorage.removeItem("studentName");
      alert("已退出登录");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
