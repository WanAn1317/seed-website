<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>在线考试系统</title>

<style>
body {
  font-family: "Microsoft YaHei", Arial;
  background: #f5f7fb;
  margin: 0;
}

/* 顶部栏 */
.exam-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2d7a2d;
  color: white;
  padding: 12px 20px;
  position: sticky;
  top: 0;
}

.exam-header button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* 标题 */
.exam-header h2 {
  margin: 0;
  font-size: 18px;
}

/* 题目卡片 */
.question {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* 选项 */
.question label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

/* 提交按钮 */
.submit-btn {
  background: #ffcc00;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- 🟢 顶部考试栏 -->
<div class="exam-header">

  <div>
    <button onclick="window.location.href='papers.html'">
      ↩ 返回试卷列表
    </button>
  </div>

  <div>
    <h2 id="paperTitle">在线考试系统</h2>
  </div>

  <div>
    <button onclick="submitQuiz()" class="submit-btn">
      📤 提交试卷
    </button>
  </div>

</div>

<!-- 🧠 题目区域 -->
<div id="quiz"></div>

<h3 id="result" style="text-align:center;"></h3>

<script>
// ============================
// 这里保持你原来的逻辑即可
// ============================

// 示例：你后面接你原来的 paper 加载逻辑
// paper.questions 渲染到 quiz

function submitQuiz() {
  let score = 0;

  paper.questions.forEach((q, index) => {
    let selected = document.querySelector(`input[name="q${index}"]:checked`);

    if (selected && selected.value === q.answer) {
      score++;
    }
  });

  document.getElementById("result").innerText =
    "得分：" + score + " / " + paper.questions.length;
}

// 👉 标题（后面接你paper加载后赋值）
function setTitle(title) {
  document.getElementById("paperTitle").innerText = title;
}
</script>

</body>
</html>
