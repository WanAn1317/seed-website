<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>在线答题</title>
</head>
<body>
  <h1 id="paperTitle">试卷加载中...</h1>
  <div id="questionBox"></div>

  <button onclick="submitPaper()">提交试卷</button>
  <h2 id="result"></h2>

  <script>
    const params = new URLSearchParams(location.search);
    const paperId = params.get("paper");

    let currentPaper = null;

    fetch("./data/papers.json")
      .then(res => res.json())
      .then(papers => {
        currentPaper = papers.find(p => p.id === paperId);

        if (!currentPaper) {
          document.getElementById("paperTitle").innerText = "找不到试卷！";
          return;
        }

        document.getElementById("paperTitle").innerText = currentPaper.title;

        const box = document.getElementById("questionBox");

        currentPaper.questions.forEach(q => {
          const div = document.createElement("div");
          div.style.border = "1px solid #ccc";
          div.style.padding = "10px";
          div.style.margin = "10px 0";

          div.innerHTML = `
            <p><b>${q.id}. ${q.question}</b></p>
            ${Object.entries(q.options).map(([key, val]) => `
              <label>
                <input type="radio" name="q${q.id}" value="${key}">
                ${key}. ${val}
              </label><br>
            `).join("")}
            <p id="analysis${q.id}" style="display:none; color:green; white-space:pre-line;"></p>
          `;

          box.appendChild(div);
        });
      });

    function submitPaper() {
      if (!currentPaper) return;

      let score = 0;

      currentPaper.questions.forEach(q => {
        const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
        const userAnswer = selected ? selected.value : "";

        if (userAnswer === q.answer) {
          score++;
        }

        const analysisBox = document.getElementById("analysis" + q.id);
        analysisBox.style.display = "block";
        analysisBox.innerText =
          `正确答案：${q.answer}\n你的答案：${userAnswer || "未作答"}\n解析：${q.analysis || "暂无解析"}`;
      });

      document.getElementById("result").innerText =
        `得分：${score} / ${currentPaper.questions.length}`;
    }
  </script>
</body>
</html>
