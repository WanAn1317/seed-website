<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>题库导入工具</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 250px; font-size: 14px; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 15px; white-space: pre-wrap; word-break: break-all; }
    input { width: 100%; padding: 8px; margin: 5px 0; font-size: 14px; }
  </style>
</head>
<body>

<h1>题库导入工具（Word → JSON）</h1>

<p>卷子ID（英文/数字/下划线，例如 paper_2026_01）：</p>
<input id="paperId" placeholder="paper_2026_01">

<p>卷子标题（显示给学生看的）：</p>
<input id="paperTitle" placeholder="2026 信息素养大赛 模拟卷01">

<p>粘贴 Word 题库原文：</p>
<textarea id="rawText" placeholder="把题目原文整套粘贴到这里..."></textarea>

<br>
<button onclick="convert()">转换为 JSON</button>
<button onclick="copyJSON()">复制 JSON</button>

<h2>转换结果：</h2>
<pre id="output"></pre>

<script>
function cleanLine(line) {
  return line.replace(/\s+/g, " ").trim();
}

function convert() {
  const paperId = document.getElementById("paperId").value.trim();
  const paperTitle = document.getElementById("paperTitle").value.trim();
  const raw = document.getElementById("rawText").value;

  if (!paperId || !paperTitle) {
    alert("请填写卷子ID和卷子标题！");
    return;
  }

  const lines = raw.split("\n").map(l => l.trim()).filter(l => l !== "");
  let questions = [];

  let i = 0;
  while (i < lines.length) {
    // 找题号（如 1. 或 1）
    if (/^\d+\./.test(lines[i]) || /^\d+$/.test(lines[i])) {
      let qid = parseInt(lines[i]);
      if (isNaN(qid)) qid = parseInt(lines[i].replace(".", ""));

      i++;

      // 题干（可能多行）
      let questionText = "";
      while (i < lines.length && !lines[i].startsWith("(5分)") && !/^[A-D]$/.test(lines[i]) && !/^正确答案/.test(lines[i])) {
        // 遇到选项内容（没有A/B标记的情况）
        if (lines[i] === "正确" || lines[i] === "错误") break;
        if (lines[i] === "显示答案") break;
        if (lines[i] === "试题解析:") break;
        questionText += (questionText ? "\n" : "") + lines[i];
        i++;
        // 如果题干后出现 (5分)，跳过
      }

      // 跳过 (5分)
      if (i < lines.length && lines[i].includes("分")) i++;

      // 读取4个选项（没有A/B标记，默认按顺序A/B/C/D）
      let optionsArr = [];
      while (i < lines.length && optionsArr.length < 4 && !/^正确答案/.test(lines[i])) {
        if (lines[i] === "显示答案") { i++; continue; }
        if (lines[i] === "试题解析:") break;
        optionsArr.push(lines[i]);
        i++;
      }

      // 判断题（只有 正确/错误 两个选项）
      if (optionsArr.length === 2 && (optionsArr[0] === "正确" || optionsArr[0] === "错误")) {
        // OK
      }

      let options = {};
      if (optionsArr.length === 4) {
        options = { A: optionsArr[0], B: optionsArr[1], C: optionsArr[2], D: optionsArr[3] };
      } else if (optionsArr.length === 2) {
        options = { A: optionsArr[0], B: optionsArr[1] };
      } else {
        // 不标准就跳过
        options = {};
      }

      // 答案
      let answer = "";
      while (i < lines.length && !/^正确答案/.test(lines[i])) i++;
      if (i < lines.length && /^正确答案/.test(lines[i])) {
        answer = lines[i].replace("正确答案", "").replace(":", "").replace("：", "").trim();
        i++;
      }

      // 跳过 “显示答案”
      if (i < lines.length && lines[i] === "显示答案") i++;

      // 解析
      let analysis = "";
      if (i < lines.length && lines[i].startsWith("试题解析")) {
        i++;
        while (i < lines.length && !(/^\d+\./.test(lines[i]) || /^\d+$/.test(lines[i]))) {
          analysis += (analysis ? "\n" : "") + lines[i];
          i++;
        }
      }

      // 判断题识别
      let qtype = "single";
      if (Object.keys(options).length === 2) qtype = "judge";

      questions.push({
        id: qid,
        type: qtype,
        question: questionText.trim(),
        options: options,
        answer: answer,
        analysis: analysis.trim()
      });

    } else {
      i++;
    }
  }

  const paperObj = {
    id: paperId,
    title: paperTitle,
    questions: questions
  };

  document.getElementById("output").textContent = JSON.stringify(paperObj, null, 2);
}

function copyJSON() {
  const text = document.getElementById("output").textContent;
  if (!text) {
    alert("请先转换生成 JSON！");
    return;
  }
  navigator.clipboard.writeText(text);
  alert("已复制 JSON！");
}
</script>

</body>
</html>
