<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>教师批量导入系统 V3</title>

  <style>
    body {
      font-family: "Microsoft YaHei";
      background: #f5f7fa;
      padding: 20px;
    }

    h2 {
      color: #2d7a2d;
    }

    textarea {
      width: 100%;
      height: 360px;
      padding: 12px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      background: #2d7a2d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #256b25;
    }

    pre {
      background: #fff;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<h2>📦 教师批量导入系统 V3</h2>

<p>📌 直接粘贴题目文本（支持你现在比赛格式）</p>

<input id="title" placeholder="试卷标题，例如：2025 信息素养大赛 初中组">

<textarea id="input" placeholder="粘贴题库内容..."></textarea>

<button onclick="parsePaper()">🚀 解析生成 JSON</button>
<button onclick="downloadJSON()">📥 下载 JSON</button>

<pre id="output"></pre>

<script>

let resultPaper = null;

function parsePaper() {
  const text = document.getElementById("input").value;
  const title = document.getElementById("title").value || "未命名试卷";

  const questions = [];

  // 按题号切分（核心）
  const blocks = text.split(/\n\d+\./).filter(b => b.trim().length > 0);

  let id = 1;

  blocks.forEach(block => {

    let question = block.match(/^(.*?)(A\.)/s);
    if (!question) return;

    let qText = question[1].replace(/\n/g, "").trim();

    let options = {};
    let optionMatches = block.match(/([A-D])\s*([\s\S]*?)(?=\n[A-D]\.|正确答案|$)/g);

    if (optionMatches) {
      optionMatches.forEach(opt => {
        let m = opt.match(/([A-D])\s*([\s\S]*)/);
        if (m) {
          options[m[1]] = m[2].replace(/\n/g, "").trim();
        }
      });
    }

    let answerMatch = block.match(/正确答案\s*[:：]\s*([A-D])/);
    let answer = answerMatch ? answerMatch[1] : "";

    let analysisMatch = block.match(/试题解析:([\s\S]*)/);
    let analysis = analysisMatch ? analysisMatch[1].trim() : "";

    questions.push({
      id: id++,
      type: "single",
      question: qText,
      options,
      answer,
      analysis
    });

  });

  resultPaper = {
    id: "paper_" + Date.now(),
    title,
    questions
  };

  document.getElementById("output").textContent =
    JSON.stringify(resultPaper, null, 2);
}

function downloadJSON() {
  if (!resultPaper) {
    alert("请先生成数据");
    return;
  }

  const blob = new Blob(
    [JSON.stringify([resultPaper], null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "papers.json";
  a.click();
}

</script>

</body>
</html>
