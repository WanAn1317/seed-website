<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线考试系统 V4</title>

<style>
body{
  margin:0;
  font-family:"Microsoft YaHei", Arial;
  background:#f5f5f5;
}

.header{
  background:#2d7a2d;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.container{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.q{
  border:1px solid #eee;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}

.question{
  font-size:15px;
  margin-bottom:10px;
  white-space: pre-wrap;
}

.opt{
  padding:8px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:6px;
  cursor:pointer;
}

.opt:hover{
  background:#eaffea;
}

.correct{
  background:#d6ffd6 !important;
  border-color:#2d7a2d;
}

.wrong{
  background:#ffd6d6 !important;
  border-color:#ff4d4d;
}

.submit{
  margin-top:20px;
  padding:12px;
  background:#2d7a2d;
  color:#fff;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#f0f8f0;
  border-left:4px solid #2d7a2d;
}
</style>
</head>

<body>

<div class="header">在线考试系统 V4</div>

<div class="container" id="box">加载中...</div>

<script>
const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paper = params.get("paper");

const url = `./exams/${subject}/${paper}`;

let answers = {};
let resultBox;

fetch(url)
.then(res=>{
  if(!res.ok) throw new Error("文件不存在");
  return res.json();
})
.then(data=>{
  render(data);
})
.catch(err=>{
  document.getElementById("box").innerHTML = "加载失败：" + url;
  console.error(err);
});

function render(data){

  const box = document.getElementById("box");
  box.innerHTML = "";

  const title = document.createElement("div");
  title.className = "question";
  title.innerHTML = "<b>" + data.title + "</b>";
  box.appendChild(title);

  data.questions.forEach((q,i)=>{

    const div = document.createElement("div");
    div.className = "q";

    const qDiv = document.createElement("div");
    qDiv.className = "question";
    qDiv.innerText = (i+1) + ". " + q.question;
    div.appendChild(qDiv);

    if(q.options){

      q.options.forEach(opt=>{

        const o = document.createElement("div");
        o.className = "opt";
        o.innerText = opt;

        o.onclick = ()=>{

          answers[i] = opt;

          // 取消同组高亮
          Array.from(div.querySelectorAll(".opt")).forEach(el=>{
            el.classList.remove("correct","wrong");
          });

          o.classList.add("correct");
        };

        div.appendChild(o);
      });

    }

    box.appendChild(div);
  });

  const btn = document.createElement("div");
  btn.className = "submit";
  btn.innerText = "提交试卷";

  btn.onclick = ()=>{

    let score = 0;
    let html = "";

    data.questions.forEach((q,i)=>{

      const userAns = answers[i];
      const correct = q.options[q.answer];

      const isRight = userAns === correct;

      if(isRight) score += (q.score || 5);

      html += `
        <div style="margin-bottom:10px;">
          <b>${i+1}. ${isRight ? "✔ 正确" : "✘ 错误"}</b><br>
          你的答案：${userAns || "未作答"}<br>
          正确答案：${correct}<br>
          <div style="color:#666;font-size:13px;">
            ${q.explanation || ""}
          </div>
        </div>
      `;
    });

    resultBox = document.createElement("div");
    resultBox.className = "result";
    resultBox.innerHTML = `
      <h3>最终得分：${score}</h3>
      <hr>
      ${html}
    `;

    box.appendChild(resultBox);
  };

  box.appendChild(btn);
}
</script>

</body>
</html>
