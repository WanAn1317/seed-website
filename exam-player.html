<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线答题</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #2d7a2d;
      color: white;
      border-color: #2d7a2d;
    }

    .main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .paper-title {
      font-size: 28px;
      font-weight: bold;
      color: #2d7a2d;
      margin-bottom: 10px;
    }

    .paper-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .question {
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fafafa;
      margin-bottom: 15px;
    }

    .question h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .options label {
      display: block;
      padding: 6px 0;
      font-size: 14px;
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #2d7a2d;
      color: white;
      font-weight: bold;
    }

    .submit-btn:hover {
      background: #256525;
    }

    .result-box {
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      background: #fffbe6;
      display: none;
      font-weight: bold;
    }

    .correct {
      border: 2px solid #2d7a2d;
      background: #f0fff0;
    }

    .wrong {
      border: 2px solid #d93025;
      background: #fff0f0;
    }

    .answer-info {
      margin-top: 12px;
      font-size: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed #ccc;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="location.href='index.html'">🌱 代码种子工作室</div>
  <button class="back-btn" onclick="history.back()">⬅ 返回</button>
</div>

<div class="main">
  <div class="paper-title" id="paperTitle">加载中...</div>
  <div class="paper-info" id="paperInfo"></div>

  <div id="questionContainer"></div>

  <button class="submit-btn" onclick="submitPaper()" id="submitBtn">
    提交试卷
  </button>

  <div class="result-box" id="resultBox"></div>
</div>

<script>
const studentName = localStorage.getItem("studentName");
if (!studentName) location.href = "login.html";

const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paperFile = params.get("paper");

let paperData = null;

// =======================
// 加载试卷
// =======================
fetch(`exams/${subject}/${paperFile}`)
  .then(res => res.json())
  .then(data => {
    paperData = data;

    document.getElementById("paperTitle").innerText = data.title;
    document.getElementById("paperInfo").innerText =
      `答题人：${studentName} | 共 ${data.questions.length} 题`;

    renderQuestions(data.questions);
  })
  .catch(err => {
    alert("加载失败，请检查 JSON 路径");
    console.error(err);
  });

// =======================
// 渲染题目（兼容 Scratch + Python）
// =======================
function renderQuestions(questions) {
  const container = document.getElementById("questionContainer");
  container.innerHTML = "";

  questions.forEach((q, index) => {
    const div = document.createElement("div");
    div.className = "question";
    div.id = "question_" + index;

    let optionsHtml = "";

    if (q.options && Array.isArray(q.options)) {
      q.options.forEach((opt, i) => {
        optionsHtml += `
          <label>
            <input type="radio" name="q${index}" value="${i}">
            ${String.fromCharCode(65 + i)}. ${opt}
          </label>
        `;
      });
    } else {
      optionsHtml = `<div style="color:red">无选项</div>`;
    }

    div.innerHTML = `
      <h3>${index + 1}. ${q.question || ""}</h3>
      <div class="options">${optionsHtml}</div>
      <div class="answer-info" id="answerInfo_${index}"></div>
    `;

    container.appendChild(div);
  });
}

// =======================
// 提交评分（兼容 Scratch 字母 + Python 数字）
// =======================
function submitPaper() {
  let score = 0;
  let total = 0;

  paperData.questions.forEach((q, index) => {
    total += q.score || 1;

    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    const box = document.getElementById("question_" + index);
    const info = document.getElementById("answerInfo_" + index);

    let correct = q.answer;

    // Scratch: A/B/C/D → 数字
    if (typeof correct === "string") {
      correct = correct.charCodeAt(0) - 65;
    }

    let user = selected ? parseInt(selected.value) : -1;

    let correctLetter = String.fromCharCode(65 + correct);
    let correctText = q.options ? q.options[correct] : "";

    info.style.display = "block";

    if (user === correct) {
      score += (q.score || 1);
      box.classList.add("correct");

      info.innerText =
        `✔ 正确\n答案：${correctLetter}\n${q.explanation || ""}`;
    } else {
      box.classList.add("wrong");

      info.innerText =
        `✘ 错误\n你的答案：${user === -1 ? "未选" : String.fromCharCode(65 + user)}\n正确：${correctLetter}\n${q.explanation || ""}`;
    }
  });

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerText =
    `得分：${score} / ${total}`;
}
</script>

</body>
</html>
