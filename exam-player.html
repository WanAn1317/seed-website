<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线答题</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
    }

    .main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .paper-title {
      font-size: 28px;
      font-weight: bold;
      color: #2d7a2d;
      margin-bottom: 10px;
    }

    .paper-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .question {
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fafafa;
      margin-bottom: 15px;
    }

    .question h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .options label {
      display: block;
      padding: 6px 0;
      font-size: 14px;
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: #2d7a2d;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .result-box {
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      background: #fffbe6;
      display: none;
      white-space: pre-line;
    }

    .correct {
      border: 2px solid #2d7a2d;
      background: #f0fff0;
    }

    .wrong {
      border: 2px solid #d93025;
      background: #fff0f0;
    }

    .answer-info {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="location.href='index.html'">🌱 代码种子工作室</div>
  <button class="back-btn" onclick="history.back()">返回</button>
</div>

<div class="main">
  <div class="paper-title" id="paperTitle">加载中...</div>
  <div class="paper-info" id="paperInfo"></div>

  <div id="questionContainer"></div>

  <button class="submit-btn" onclick="submitPaper()" id="submitBtn">提交试卷</button>

  <div class="result-box" id="resultBox"></div>
</div>

<script>
let paperData = null;

const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paperFile = params.get("paper");

fetch(`exams/${subject}/${paperFile}`)
  .then(res => res.json())
  .then(data => {
    paperData = data;

    document.getElementById("paperTitle").innerText = data.title;
    document.getElementById("paperInfo").innerText =
      `题目数量：${data.questions.length}`;

    render(data.questions);
  });

function render(questions) {
  const box = document.getElementById("questionContainer");
  box.innerHTML = "";

  questions.forEach((q, i) => {
    let html = "";

    q.options.forEach((opt, idx) => {
      html += `
        <label>
          <input type="radio" name="q${i}" value="${idx}">
          ${String.fromCharCode(65 + idx)}. ${opt}
        </label>
      `;
    });

    box.innerHTML += `
      <div class="question" id="qbox${i}">
        <h3>${i + 1}. ${q.question || ""}</h3>
        <div class="options">${html}</div>
        <div class="answer-info" id="info${i}"></div>
      </div>
    `;
  });
}

function submitPaper() {
  let score = 0;
  let total = 0;

  paperData.questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const box = document.getElementById(`qbox${i}`);
    const info = document.getElementById(`info${i}`);

    let isCorrect = false;

    if (selected) {
      // Python（数字）
      if (typeof q.answer === "number") {
        isCorrect = parseInt(selected.value) === q.answer;
      }

      // Scratch（字母）
      if (typeof q.answer === "string") {
        const letter = String.fromCharCode(65 + parseInt(selected.value));
        isCorrect = letter === q.answer;
      }
    }

    total += 1;

    const userAns = selected
      ? String.fromCharCode(65 + parseInt(selected.value))
      : "未作答";

    const correctAns =
      typeof q.answer === "number"
        ? String.fromCharCode(65 + q.answer)
        : q.answer;

    if (isCorrect) {
      score++;
      box.classList.add("correct");

      info.innerText =
        `✔ 正确\n你的答案：${userAns}\n正确答案：${correctAns}\n\n${q.analysis || ""}`;
    } else {
      box.classList.add("wrong");

      info.innerText =
        `✘ 错误\n你的答案：${userAns}\n正确答案：${correctAns}\n\n${q.analysis || ""}`;
    }

    info.style.display = "block";
  });

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerText =
    `得分：${score} / ${total}`;

  document.getElementById("submitBtn").disabled = true;
}
</script>

</body>
</html>
