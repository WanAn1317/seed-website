<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线答题</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #2d7a2d;
      color: white;
      border-color: #2d7a2d;
    }

    .main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .paper-title {
      font-size: 28px;
      font-weight: bold;
      color: #2d7a2d;
      margin-bottom: 10px;
    }

    .paper-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .question {
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fafafa;
      margin-bottom: 15px;
    }

    .question h3 {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap; /* ⭐关键：保留换行 */
    }

    .options label {
      display: block;
      padding: 6px 0;
      cursor: pointer;
      font-size: 14px;
      white-space: pre-wrap; /* ⭐防止选项挤压 */
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #2d7a2d;
      color: white;
      font-weight: bold;
    }

    .submit-btn:hover {
      background: #256525;
    }

    .result-box {
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fffbe6;
      font-size: 16px;
      font-weight: bold;
      display: none;
      line-height: 1.6;
    }

    .correct {
      border: 2px solid #2d7a2d;
      background: #f0fff0;
    }

    .wrong {
      border: 2px solid #d93025;
      background: #fff0f0;
    }

    .answer-info {
      margin-top: 12px;
      font-size: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed #ccc;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="location.href='index.html'">🌱 代码种子工作室</div>
  <button class="back-btn" onclick="history.back()">⬅ 返回</button>
</div>

<div class="main">
  <div class="paper-title" id="paperTitle">加载中...</div>
  <div class="paper-info" id="paperInfo"></div>

  <div id="questionContainer"></div>

  <button class="submit-btn" onclick="submitPaper()" id="submitBtn">
    提交试卷并评分
  </button>

  <div class="result-box" id="resultBox"></div>
</div>

<script>
const studentName = localStorage.getItem("studentName");
if (!studentName) location.href = "login.html";

const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paperFile = params.get("paper");

let paperData = null;

fetch(`exams/${subject}/${paperFile}`)
  .then(r => r.json())
  .then(data => {
    paperData = data;

    document.getElementById("paperTitle").innerText = data.title;
    document.getElementById("paperInfo").innerText =
      `答题人：${studentName} | 共 ${data.questions.length} 题`;

    renderQuestions(data.questions);
  });

function renderQuestions(questions) {
  const container = document.getElementById("questionContainer");
  container.innerHTML = "";

  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";
    div.id = "q_" + i;

    const title = document.createElement("h3");
    title.textContent = `${i + 1}. ${q.question}`;
    div.appendChild(title);

    const opt = document.createElement("div");
    opt.className = "options";

    q.options.forEach((o, j) => {
      const label = document.createElement("label");

      label.innerHTML = `
        <input type="radio" name="q${i}" value="${j}">
        ${String.fromCharCode(65 + j)}. ${o}
      `;

      opt.appendChild(label);
    });

    div.appendChild(opt);

    const info = document.createElement("div");
    info.className = "answer-info";
    info.id = "info_" + i;

    div.appendChild(info);
    container.appendChild(div);
  });
}

function submitPaper() {
  let score = 0;
  let total = 0;
  let correct = 0;

  paperData.questions.forEach((q, i) => {
    total += q.score || 1;

    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const box = document.getElementById("q_" + i);
    const info = document.getElementById("info_" + i);

    const right = q.answer;

    let user = sel ? parseInt(sel.value) : -1;

    if (user === right) {
      score += q.score || 1;
      correct++;
      box.classList.add("correct");
    } else {
      box.classList.add("wrong");
    }

    info.style.display = "block";
    info.innerText =
      `你的答案：${user === -1 ? "未作答" : String.fromCharCode(65 + user)}\n` +
      `正确答案：${String.fromCharCode(65 + right)}\n\n` +
      q.explanation;
  });

  const percent = Math.round((score / total) * 100);

  const result = document.getElementById("resultBox");
  result.style.display = "block";
  result.innerText =
    `得分：${score}/${total}\n正确率：${percent}%\n正确题数：${correct}`;
}
</script>

</body>
</html>
