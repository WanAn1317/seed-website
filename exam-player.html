<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线答题</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
    }

    .main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .paper-title {
      font-size: 28px;
      font-weight: bold;
      color: #2d7a2d;
      margin-bottom: 10px;
    }

    .paper-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .question {
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: #fafafa;
      margin-bottom: 15px;
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #2d7a2d;
      color: white;
      font-weight: bold;
    }

    .result-box {
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      background: #fffbe6;
      display: none;
    }

    .correct { background: #f0fff0; border: 2px solid #2d7a2d; }
    .wrong { background: #fff0f0; border: 2px solid #d93025; }

    .answer-info {
      margin-top: 10px;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="logo">🌱 代码种子工作室</div>
  <button class="back-btn" onclick="history.back()">返回</button>
</div>

<div class="main">
  <div class="paper-title" id="paperTitle">加载中...</div>
  <div class="paper-info" id="paperInfo"></div>

  <div id="questionContainer"></div>

  <button class="submit-btn" onclick="submitPaper()">提交试卷</button>

  <div class="result-box" id="resultBox"></div>
</div>

<script>
const studentName = localStorage.getItem("studentName") || "未登录";

const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paperFile = params.get("paper");

console.log("subject:", subject);
console.log("paperFile:", paperFile);

if (!subject || !paperFile) {
  alert("缺少参数");
}

/* ⭐⭐⭐ 核心修复：统一路径处理 ⭐⭐⭐ */
function getPaperPath() {
  let file = paperFile;

  // 自动补 .json
  if (!file.endsWith(".json")) {
    file += ".json";
  }

  // ⭐ GitHub Pages 必须用项目路径
  return `/seed-website/exams/${subject}/${file}`;
}

let paperData = null;

fetch(getPaperPath())
  .then(res => {
    if (!res.ok) {
      throw new Error("加载失败：" + res.status);
    }
    return res.json();
  })
  .then(data => {
    paperData = data;

    document.getElementById("paperTitle").innerText = data.title;
    document.getElementById("paperInfo").innerText =
      "学生：" + studentName + " | 共 " + data.questions.length + " 题";

    render(data.questions);
  })
  .catch(err => {
    console.error(err);
    alert("试卷加载失败，请检查路径或文件");
  });

function render(list) {
  const box = document.getElementById("questionContainer");
  box.innerHTML = "";

  list.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";
    div.id = "q_" + i;

    let opts = "";
    if (q.options) {
      q.options.forEach((o, idx) => {
        opts += `
          <label>
            <input type="radio" name="q${i}" value="${idx}">
            ${String.fromCharCode(65 + idx)}. ${o}
          </label>
        `;
      });
    }

    div.innerHTML = `
      <div>${i + 1}. ${q.question || ""}</div>
      <div>${opts}</div>
      <div class="answer-info" id="a_${i}"></div>
    `;

    box.appendChild(div);
  });
}

function submitPaper() {
  let score = 0;
  let total = paperData.questions.length;

  paperData.questions.forEach((q, i) => {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const ansBox = document.getElementById("a_" + i);
    const qDiv = document.getElementById("q_" + i);

    const correct = q.answer;

    if (sel && parseInt(sel.value) == correct) {
      score++;
      qDiv.classList.add("correct");
      ansBox.innerText = "✔ 正确";
    } else {
      qDiv.classList.add("wrong");
      ansBox.innerText = "✘ 错误，正确答案：" + String.fromCharCode(65 + correct);
    }

    ansBox.style.display = "block";
  });

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerText =
    `得分：${score} / ${total}`;
}
</script>

</body>
</html>
