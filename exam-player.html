<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线考试系统</title>

<style>
body{
  margin:0;
  font-family:"Microsoft YaHei", Arial;
  background:#f5f5f5;
}

.header{
  background:#2d7a2d;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.container{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.q{
  border:1px solid #eee;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  background:#fff;
}

.question{
  font-size:15px;
  margin-bottom:10px;
  white-space: pre-wrap; /* ⭐关键修复：保留换行 */
}

.opt{
  padding:8px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.opt:hover{
  background:#eaffea;
  border-color:#2d7a2d;
}

.submit{
  margin-top:20px;
  padding:12px;
  background:#2d7a2d;
  color:#fff;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}

.title{
  font-size:18px;
  margin-bottom:15px;
  color:#333;
}
</style>
</head>

<body>

<div class="header">在线考试系统</div>

<div class="container" id="box">
加载中...
</div>

<script>
const params = new URLSearchParams(location.search);
const subject = params.get("subject");
const paper = params.get("paper");

if(!subject || !paper){
  document.getElementById("box").innerHTML = "参数错误";
}

// ⭐注意：你的 list.json 已经带 .json，所以这里不再拼接
const url = `./exams/${subject}/${paper}`;

let answers = {};

fetch(url)
.then(res=>{
  if(!res.ok) throw new Error("文件不存在");
  return res.json();
})
.then(data=>{
  render(data);
})
.catch(err=>{
  document.getElementById("box").innerHTML = "加载失败：" + url;
  console.error(err);
});

function render(data){

  const box = document.getElementById("box");
  box.innerHTML = "";

  // 标题
  const title = document.createElement("div");
  title.className = "title";
  title.innerText = data.title || "试卷";
  box.appendChild(title);

  // 题目
  data.questions.forEach((q, i)=>{

    const div = document.createElement("div");
    div.className = "q";

    // ⭐关键修复：换行 + 代码不挤一起
    const qDiv = document.createElement("div");
    qDiv.className = "question";
    qDiv.innerText = (i+1) + ". " + q.question;
    div.appendChild(qDiv);

    // 选项（必须独立渲染）
    if(q.options && q.options.length){

      q.options.forEach(opt => {
        const o = document.createElement("div");
        o.className = "opt";
        o.innerText = opt;

        o.onclick = ()=>{
          answers[i] = opt;
          o.style.background = "#d6ffd6";
        };

        div.appendChild(o);
      });

    }

    box.appendChild(div);
  });

  // 提交按钮
  const btn = document.createElement("div");
  btn.className = "submit";
  btn.innerText = "提交试卷";

  btn.onclick = ()=>{

    let score = 0;

    data.questions.forEach((q,i)=>{

      const userAns = answers[i];
      const correct = q.options[q.answer];

      if(userAns === correct){
        score += (q.score || 5);
      }
    });

    alert("得分：" + score);
  };

  box.appendChild(btn);
}
</script>

</body>
</html>
