<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线考试</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Microsoft YaHei";
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      background: #2d7a2d;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .option {
      display: block;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .option:hover {
      background: #eaffea;
    }

    .submit {
      margin-top: 20px;
      padding: 10px;
      background: #2d7a2d;
      color: white;
      text-align: center;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="header">
  在线考试系统
</div>

<div class="container" id="container">
  正在加载试卷...
</div>

<script>
  const params = new URLSearchParams(location.search);

  const subject = params.get("subject");
  const paper = params.get("paper");

  if (!subject || !paper) {
    document.getElementById("container").innerHTML =
      "参数错误";
  }

  const url = `./exams/${subject}/${paper}.json`;

  console.log("加载试卷：", url);

  fetch(url)
    .then(res => {
      if (!res.ok) {
        throw new Error("试卷不存在：" + url);
      }
      return res.json();
    })
    .then(data => {
      render(data);
    })
    .catch(err => {
      console.error(err);
      document.getElementById("container").innerHTML =
        "加载失败：" + url;
    });

  function render(data) {
    const box = document.getElementById("container");

    let score = 0;
    let answers = {};

    box.innerHTML = "";

    data.questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";

      div.innerHTML = `
        <div>${i + 1}. ${q.title}</div>
      `;

      q.options.forEach(opt => {
        const o = document.createElement("div");
        o.className = "option";
        o.innerText = opt;

        o.onclick = () => {
          answers[i] = opt;
          o.style.background = "#d6ffd6";
        };

        div.appendChild(o);
      });

      box.appendChild(div);
    });

    const btn = document.createElement("div");
    btn.className = "submit";
    btn.innerText = "提交试卷";

    btn.onclick = () => {
      score = 0;

      data.questions.forEach((q, i) => {
        if (answers[i] === q.answer) {
          score++;
        }
      });

      alert(`你的得分：${score} / ${data.questions.length}`);
    };

    box.appendChild(btn);
  }
</script>

</body>
</html>
