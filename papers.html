<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>试卷列表</title>

<style>
body{
  font-family:"Microsoft YaHei",Arial;
  margin:0;
  padding:20px;
  background:#fff;
  display:flex;
  justify-content:center;
}

/* 主容器 */
.container{
  width:100%;
  max-width:900px;
}

/* 标题 */
h1,p{
  text-align:center;
}

/* 返回首页 */
.back-home{
  display:inline-block;
  margin-bottom:12px;
  padding:8px 14px;
  background:#2d7a2d;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-size:14px;
}

/* tab区域 */
.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:20px 0;
}

.tab-btn{
  padding:8px 16px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.2s;
}

.tab-btn.active{
  background:#2d7a2d;
  color:#fff;
  border-color:#2d7a2d;
}

/* 试卷列表 */
.paper-list{
  list-style:none;
  padding:0;
  margin-top:10px;
}

.paper-list li{
  text-align:center;
  padding:14px;
  margin:10px 0;
  border:1px solid #eee;
  border-radius:10px;
  background:#fafafa;
  transition:0.2s;
}

.paper-list li:hover{
  background:#eafff2;
  border-color:#2d7a2d;
  transform:translateY(-2px);
}

.paper-list a{
  text-decoration:none;
  color:#333;
  font-size:15px;
  display:block;
}

.paper-list a:hover{
  color:#2d7a2d;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<!-- 返回首页 -->
<a class="back-home" href="index.html">⬅ 返回首页</a>

<h1>试卷列表</h1>
<p>请选择科目后开始答题</p>

<!-- 科目切换 -->
<div class="tabs">
  <button class="tab-btn active" onclick="showSubject('python')" id="btn-python">🐍 Python</button>
  <button class="tab-btn" onclick="showSubject('scratch')" id="btn-scratch">🎮 图形化编程</button>
  <button class="tab-btn" onclick="showSubject('cpp')" id="btn-cpp">💻 C++</button>
</div>

<!-- 列表 -->
<ul id="paperList" class="paper-list"></ul>

</div>

<script>
let allPapers = [];
let currentSubject = "python";

fetch("./data/papers.json")
  .then(res => res.json())
  .then(data => {
    allPapers = data;
    renderList();
  });

function showSubject(subject){
  currentSubject = subject;

  document.querySelectorAll(".tab-btn")
    .forEach(btn => btn.classList.remove("active"));

  document.getElementById("btn-" + subject).classList.add("active");

  renderList();
}

function renderList(){
  const ul = document.getElementById("paperList");
  ul.innerHTML = "";

  const list = allPapers.filter(p => (p.subject || "python") === currentSubject);

  if(list.length === 0){
    ul.innerHTML = "<li>暂无试卷</li>";
    return;
  }

  list.forEach(p => {
    const li = document.createElement("li");
    li.innerHTML = `
      <a href="quiz.html?paper=${p.id}">
        📄 ${p.title}
      </a>
    `;
    ul.appendChild(li);
  });
}
</script>

</body>
</html>
