<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线试卷题库</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* 顶部导航 */
    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      text-decoration: none;
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #2d7a2d;
      color: white;
      border-color: #2d7a2d;
    }

    /* 主体 */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 80px;
      padding: 0 20px;
    }

    .main h1 {
      font-size: 36px;
      margin: 0;
      color: #2d7a2d;
    }

    .main p {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }

    /* 按钮区域 */
    .subject-box {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .subject-btn {
      width: 220px;
      height: 120px;
      border-radius: 16px;
      border: 1px solid #eee;
      background: #fafafa;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      color: #333;
      transition: 0.25s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .subject-btn:hover {
      background: #2d7a2d;
      color: white;
      transform: translateY(-3px);
    }

    footer {
      margin-top: 90px;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <!-- 顶部导航 -->
  <div class="nav">
    <div class="logo" onclick="location.href='index.html'">🌱 代码种子工作室</div>
    <a class="back-btn" href="index.html">⬅ 返回首页</a>
  </div>

  <!-- 主体内容 -->
  <div class="main">
    <h1>在线试卷题库</h1>
    <p>请选择科目进入试卷列表</p>

    <div class="subject-box">
      <button class="subject-btn" onclick="goSubject('python')">🐍 Python</button>
      <button class="subject-btn" onclick="goSubject('scratch')">🎮 Scratch</button>
      <button class="subject-btn" onclick="goSubject('cpp')">💻 C++</button>
    </div>
  </div>

  <footer>
    © 2026 代码种子工作室 | 在线试卷题库
  </footer>

  <script>
    // 登录保护（防止没登录直接进来）
    const studentName = localStorage.getItem("studentName");
    if (!studentName) {
      window.location.href = "login.html";
    }

    function goSubject(subject) {
      window.location.href = "paper-list.html?subject=" + subject;
    }
  </script>

</body>
</html>
