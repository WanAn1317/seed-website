<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>试卷列表</title>

<style>
body{
  font-family:"Microsoft YaHei",Arial;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:900px;
}

h1,p{
  text-align:center;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px 0;
  flex-wrap:wrap;
}

.tab-btn{
  padding:8px 16px;
  border:1px solid #ddd;
  border-radius:20px;
  background:#f5f5f5;
  cursor:pointer;
}

.tab-btn.active{
  background:#2d7a2d;
  color:#fff;
  border-color:#2d7a2d;
}

.paper-list{
  list-style:none;
  padding:0;
}

.paper-list li{
  text-align:center;
  padding:12px;
  margin:10px 0;
  border:1px solid #eee;
  border-radius:10px;
  background:#fafafa;
}

.paper-list li:hover{
  background:#eafff2;
}
</style>

</head>

<body>

<div class="container">

<h1>试卷列表</h1>
<p>请选择科目后开始答题</p>

<div class="tabs">
  <button class="tab-btn active" onclick="showSubject('python')" id="btn-python">Python</button>
  <button class="tab-btn" onclick="showSubject('scratch')" id="btn-scratch">图形化编程</button>
  <button class="tab-btn" onclick="showSubject('cpp')" id="btn-cpp">C++</button>
</div>

<ul id="paperList" class="paper-list"></ul>

</div>

<script>
let allPapers=[];
let current="python";

fetch("./data/papers.json")
.then(r=>r.json())
.then(data=>{
  allPapers=data;
  render();
});

function showSubject(s){
  current=s;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+s).classList.add("active");
  render();
}

function render(){
  let ul=document.getElementById("paperList");
  ul.innerHTML="";

  let list=allPapers.filter(p=>(p.subject||"python")==current);

  if(list.length==0){
    ul.innerHTML="<li>暂无试卷</li>";
    return;
  }

  list.forEach(p=>{
    let li=document.createElement("li");
    li.innerHTML=`<a href="quiz.html?paper=${p.id}">${p.title}</a>`;
    ul.appendChild(li);
  });
}
</script>

</body>
</html>
