/* =========================
📌 运行逻辑
========================= */

let current = [];
let currentChapter = null;

function filter(){

    let type=document.getElementById("type").value;
    let level=document.getElementById("level").value;

    let html="";

    db.forEach((c,i)=>{

        if(type!="all" && c.type!=type) return;
        if(level!="all" && c.level!=level) return;

        html+=`
        <div class="card">
            <div><b>${c.title}</b></div>
            <div class="tag">标签：${c.tag} | 难度：${levelName(c.level)}</div>
            <button class="btn" onclick="start(${i})">开始练习</button>
        </div>`;
    });

    document.getElementById("list").innerHTML=html;
    document.getElementById("quiz").innerHTML="";
    document.getElementById("result").innerHTML="";
    document.getElementById("list").style.display="block";
}

function levelName(lv){
    if(lv=="easy") return "入门";
    if(lv=="base") return "基础";
    if(lv=="hard") return "进阶";
    return "未知";
}

function start(i){

    currentChapter = db[i];

    // 随机打乱
    current = currentChapter.questions.slice().sort(()=>Math.random()-0.5);

    document.getElementById("list").style.display="none";
    document.getElementById("result").innerHTML="";
    show();
}

function show(){

    let html=`<div class="card">
        <b>📘 当前章节：${currentChapter.title}</b>
        <div class="tag">标签：${currentChapter.tag} | 难度：${levelName(currentChapter.level)}</div>
    </div>`;

    current.forEach((q,i)=>{

        html+=`<div class="card">
        <div>${i+1}. ${q.q}</div>`;

        if(q.options){
            q.options.forEach((o,j)=>{
                html+=`
                <label class="option">
                    <input type="radio" name="q${i}" value="${j}">
                    ${o}
                </label>`;
            });
        }

        html+="</div>";
    });

    html+=`
    <button class="btn" onclick="submit()">提交</button>
    <button class="btn" onclick="back()" style="background:#2196F3;margin-left:10px;">返回上一页</button>
    `;

    document.getElementById("quiz").innerHTML=html;
}

function submit(){

    let score=0;
    let html="";

    current.forEach((q,i)=>{

        let s=document.querySelector(\`input[name=q\${i}]:checked\`);
        let v=s?parseInt(s.value):-1;

        let ok=v===q.a;

        if(ok)score++;

        html+=`
        <div class="card">
            <div>${i+1}. ${q.q}</div>
            <div class="${ok?'correct':'wrong'}">${ok?'✅ 正确':'❌ 错误'}</div>
            <div class="tag">正确答案：${q.options[q.a]}</div>
        </div>`;
    });

    document.getElementById("result").innerHTML=
    \`<div class="card"><h3>🎯 得分：${score}/${current.length}</h3></div>\`+html;

    // 禁止修改答案
    document.querySelectorAll("input[type=radio]").forEach(i=>{
        i.disabled=true;
    });
}

function back(){
    document.getElementById("quiz").innerHTML="";
    document.getElementById("result").innerHTML="";
    document.getElementById("list").style.display="block";
}

filter();

</script>
