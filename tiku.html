<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Python 题库练习系统</title>

  <style>
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fb;
      color: #333;
    }

    /* 顶部区域 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .btn-home {
      padding: 10px 16px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn-home:hover {
      background: #0056b3;
    }

    /* 主体内容 */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    /* 标题居中 */
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 35px;
      color: #222;
    }

    /* 筛选卡片 */
    .filter-card {
      background: white;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    /* 下拉框美化 */
    select {
      width: 280px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
      outline: none;
      background: #f9fbff;
      cursor: pointer;
      transition: 0.2s;
    }

    select:hover {
      border-color: #007bff;
    }

    select:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.2);
      background: white;
    }

    /* 筛选按钮美化 */
    #btnFilter {
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      background: #28a745;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #btnFilter:hover {
      background: #1e7e34;
    }

    /* 小屏适配 */
    @media (max-width: 600px) {
      select {
        width: 100%;
      }
      #btnFilter {
        width: 100%;
      }
      .filter-card {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- 顶部返回按钮 -->
  <div class="top-bar">
    <a href="index.html" class="btn-home">← 返回首页</a>
  </div>

  <div class="container">
    <h1>Python 题库练习系统</h1>

    <!-- 筛选区域 -->
    <div class="filter-card">
      <!-- 章节下拉 -->
      <select id="chapterSelect">
        <option value="">📌 请选择章节</option>
        <option>第一章：Python入门与编程习惯</option>
        <option>第二章：变量与数据类型</option>
        <option>第三章：运算符与表达式</option>
        <option>第四章：条件判断（分支结构）</option>
        <option>第五章：循环结构（while循环）</option>
        <option>第六章：循环结构（for循环）</option>
        <option>第七章：嵌套循环（重点章节）</option>
        <option>第八章：字符串（str）基础与应用</option>
        <option>第九章：列表（list）基础与应用</option>
        <option>第十章：二维列表（矩阵思维）</option>
        <option>第十一章：元组与集合</option>
        <option>第十二章：字典与键值对思维</option>
        <option>第十三章：函数（def）基础</option>
        <option>第十四章：函数进阶与代码结构</option>
        <option>第十五章：常用内置函数与算法思想</option>
        <option>第十六章：随机数与小游戏项目</option>
        <option>第十七章：文件操作（基础）</option>
        <option>第十八章：CSV表格处理</option>
        <option>第十九章：异常处理</option>
        <option>第二十章：面向对象OOP</option>
        <option>第二十一章：面向对象进阶</option>
        <option>第二十二章：Python Turtle绘图</option>
        <option>第二十三章：GUI图形界面（Tkinter）</option>
        <option>第二十四章：算法启蒙（竞赛基础）</option>
      </select>

      <!-- 题目类型下拉 -->
      <select id="typeSelect">
        <option value="">📝 请选择题型</option>
        <option>选择题</option>
        <option>判断题</option>
        <option>编程题</option>
      </select>

      <!-- 筛选按钮 -->
      <button id="btnFilter">🔍 筛选</button>
    </div>
  </div>

  <script>
    document.getElementById("btnFilter").addEventListener("click", function () {
      const chapter = document.getElementById("chapterSelect").value;
      const type = document.getElementById("typeSelect").value;

      if (!chapter || !type) {
        alert("请先选择章节和题目类型！");
        return;
      }

      alert("筛选条件：\n章节：" + chapter + "\n题目类型：" + type);
    });
  </script>

</body>
</html>
