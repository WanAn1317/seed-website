<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>试卷列表</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .nav {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      border-bottom: 1px solid #eee;
    }

    .nav .logo {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      text-decoration: none;
      font-size: 14px;
      color: #555;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      transition: 0.2s;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #2d7a2d;
      color: white;
      border-color: #2d7a2d;
    }

    .main {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .main h1 {
      font-size: 28px;
      color: #2d7a2d;
      margin-bottom: 10px;
    }

    .main p {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    .paper-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .paper-list li {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .paper-list li:hover {
      background: #2d7a2d;
      color: white;
      transform: translateY(-2px);
    }

    .paper-title {
      font-size: 16px;
      font-weight: bold;
    }

    .paper-go {
      font-size: 13px;
      opacity: 0.8;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="logo" onclick="location.href='index.html'">🌱 代码种子工作室</div>
    <button class="back-btn" onclick="location.href='papers.html'">⬅ 返回科目选择</button>
  </div>

  <div class="main">
    <h1 id="pageTitle">试卷列表</h1>
    <p id="pageDesc">请选择一张试卷开始答题</p>

    <ul class="paper-list" id="paperList"></ul>
  </div>

  <footer>
    © 2026 代码种子工作室 | 在线试卷题库
  </footer>

  <script>
    // 登录保护
    const studentName = localStorage.getItem("studentName");
    if (!studentName) {
      window.location.href = "login.html";
    }

    // 获取科目参数
    const params = new URLSearchParams(location.search);
    const subject = params.get("subject");

    if (!subject) {
      alert("科目参数缺失！");
      location.href = "papers.html";
    }

    // 科目中文名
    const subjectMap = {
      python: "Python",
      scratch: "Scratch",
      cpp: "C++"
    };

    document.getElementById("pageTitle").innerText = subjectMap[subject] + " 试卷列表";

    // 读取 list.json
   fetch("exams/scratch/list.json")
      .then(res => res.json())
      .then(data => {
        const paperList = document.getElementById("paperList");

        if (data.length === 0) {
          paperList.innerHTML = "<li>暂无试卷</li>";
          return;
        }

        data.forEach(paper => {
          const li = document.createElement("li");
          li.innerHTML = `
            <div class="paper-title">📄 ${paper.name}</div>
            <div class="paper-go">点击进入 →</div>
          `;

          li.onclick = () => {
            location.href = `exam-player.html?subject=${subject}&paper=${paper.file}`;
          };

          paperList.appendChild(li);
        });
      })
      .catch(err => {
        alert("加载试卷列表失败，请检查 list.json 是否存在！");
        console.error(err);
      });
  </script>

</body>
</html>
