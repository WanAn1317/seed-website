<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>试卷列表</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial;
      background: #fff;
      color: #333;
    }

    .nav {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-weight: bold;
      color: #2d7a2d;
      cursor: pointer;
    }

    .back-btn {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: #fafafa;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      color: #2d7a2d;
    }

    .paper-list {
      list-style: none;
      padding: 0;
    }

    .paper-list li {
      background: #fafafa;
      border: 1px solid #eee;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      transition: 0.2s;
    }

    .paper-list li:hover {
      background: #2d7a2d;
      color: white;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="location.href='index.html'">
    🌱 代码种子工作室
  </div>

  <button class="back-btn" onclick="location.href='papers.html'">
    ⬅ 返回
  </button>
</div>

<div class="main">
  <h1 id="pageTitle">试卷列表</h1>
  <p>请选择试卷开始答题</p>

  <ul class="paper-list" id="paperList"></ul>
</div>

<script>
  // 登录检查
  const studentName = localStorage.getItem("studentName");
  if (!studentName) {
    location.href = "login.html";
  }

  // 获取 subject
  const params = new URLSearchParams(location.search);
  const subject = params.get("subject");

  if (!subject) {
    alert("缺少 subject 参数");
    location.href = "papers.html";
  }

  // 学科名称
  const subjectMap = {
    python: "Python",
    scratch: "Scratch",
    cpp: "C++"
  };

  document.getElementById("pageTitle").innerText =
    (subjectMap[subject] || "未知") + " 试卷列表";

  // ⭐ 正确路径（核心修复）
  const url = `./exams/${subject}/list.json`;

  console.log("加载路径：", url);

  fetch(url)
    .then(res => {
      if (!res.ok) {
        throw new Error("找不到：" + url);
      }
      return res.json();
    })
    .then(data => {
      const list = document.getElementById("paperList");

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = "<li>暂无试卷</li>";
        return;
      }

      data.forEach(item => {
        const li = document.createElement("li");

        li.innerHTML = `
          <div>📄 ${item.name}</div>
          <div>→</div>
        `;

        li.onclick = () => {
          location.href =
            `exam-player.html?subject=${subject}&paper=${item.file}`;
        };

        list.appendChild(li);
      });
    })
    .catch(err => {
      console.error(err);
      document.getElementById("paperList").innerHTML =
        `<li>加载失败：${url}</li>`;
    });
</script>

</body>
</html>
